apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: cdk8s-test-app
  name: cdk8s-test-app
spec:
  minReadySeconds: 0
  progressDeadlineSeconds: 600
  replicas: 4
  selector:
    matchLabels:
      cdk8s.io/metadata.addr: cdk8s-test-app-Deployment-c89aac05
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        cdk8s.io/metadata.addr: cdk8s-test-app-Deployment-c89aac05
    spec:
      automountServiceAccountToken: false
      containers:
        - image: nginx:latest
          imagePullPolicy: IfNotPresent
          name: test-app
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: 1000m
              memory: 1024Mi
            requests:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
          startupProbe:
            failureThreshold: 3
            tcpSocket:
              port: 80
      dnsPolicy: ClusterFirst
      hostNetwork: false
      restartPolicy: Always
      securityContext:
        fsGroupChangePolicy: Always
        runAsNonRoot: false
      setHostnameAsFQDN: false
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: cdk8s-test-app
  name: cdk8s-test-app
spec:
  externalIPs: []
  ports:
    - port: 80
      targetPort: 80
  selector:
    cdk8s.io/metadata.addr: cdk8s-test-app-Deployment-c89aac05
  type: ClusterIP
