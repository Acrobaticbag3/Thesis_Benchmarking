apiVersion: apps/v1
kind: Deployment
metadata:
  name: kustomize-test-app
  labels:
    app: kustomize-test-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kustomize-test-app
  template:
    metadata:
      labels:
        app: kustomize-test-app
    spec:
      containers:
      - name: test-app
        image: nginx:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kustomize-test-app
spec:
  selector:
    app: kustomize-test-app
  ports:
  - name: http
    port: 80
    targetPort: 80
