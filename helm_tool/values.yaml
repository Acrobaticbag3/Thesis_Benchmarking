replicaCount: 4

image:
  repository: nginx
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 1000m    # max 1 CPU per pod
    memory: 1Gi   # max memory per pod
  requests:
    cpu: 200m     # min 0.2 CPU per pod
    memory: 256Mi # min memory per pod